<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>致胡萝卜 · 生日快乐</title>
<style>
  :root{
    --space-top:#0A1430; --space-mid:#12244C; --space-glow:#1E3E72;
    --planet:#3A78C2; --planet-dark:#1C3F73; --planet-rim:#6FB4E8;
    --carrot:#FF9446; --carrot-dark:#F26A1B; --leaf:#5BC0B0; --leaf-dark:#2E9488;
    --ink:#10233F; --cream:#EAF3FF; --gold:#FFD66B; --teal:#7FE3D6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    overflow:hidden;color:var(--cream);
    background:radial-gradient(130% 90% at 50% 18%,var(--space-glow),var(--space-mid) 45%,var(--space-top) 100%);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- 顶部 HUD ---------- */
  #hud{position:fixed;top:0;left:0;right:0;z-index:40;
    display:flex;align-items:center;justify-content:space-between;padding:14px 18px;pointer-events:none;}
  #hud .title{font-size:15px;font-weight:800;letter-spacing:1px;color:var(--cream);
    text-shadow:0 1px 8px rgba(0,0,0,.5);}
  #hud .title small{display:block;font-size:11px;font-weight:600;opacity:.65;letter-spacing:2px;color:var(--teal);}
  #counter{background:rgba(14,35,63,.55);border:1.5px solid rgba(127,227,214,.45);
    padding:6px 14px;border-radius:999px;font-weight:800;font-size:14px;color:var(--teal);
    box-shadow:0 4px 16px rgba(0,0,0,.35);backdrop-filter:blur(4px);}
  #counter b{font-size:18px;color:var(--cream);}

  /* ---------- 星空 ---------- */
  #garden{position:fixed;inset:0;}
  .bgstar{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.18;}50%{opacity:.95;}}

  /* ---------- 蓝色星球地面 ---------- */
  #planet-ground{position:absolute;left:50%;transform:translateX(-50%);
    width:240vw;height:240vw;bottom:calc(42vh - 240vw);border-radius:50%;
    background:radial-gradient(120% 120% at 50% 8%,var(--planet-rim) 0%,var(--planet) 22%,var(--planet-dark) 70%);
    box-shadow:0 -10px 60px rgba(110,180,232,.35), inset 0 30px 70px rgba(255,255,255,.12);}
  #planet-ground .crater{position:absolute;background:rgba(12,40,80,.4);border-radius:50%;
    box-shadow:inset 2px 3px 6px rgba(0,0,0,.3);}
  .atmos{position:absolute;left:50%;bottom:38vh;transform:translateX(-50%);
    width:120vw;height:30vh;background:radial-gradient(closest-side,rgba(127,227,214,.25),transparent 70%);
    filter:blur(6px);pointer-events:none;}

  .hint{position:fixed;left:50%;top:50%;transform:translateX(-50%);z-index:20;
    background:rgba(14,35,63,.7);color:var(--cream);padding:10px 18px;border-radius:999px;
    font-size:13px;font-weight:700;box-shadow:0 6px 22px rgba(0,0,0,.4);border:1px solid rgba(127,227,214,.3);
    animation:bob 2.2s ease-in-out infinite;text-align:center;max-width:80vw;backdrop-filter:blur(4px);}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-6px);}}

  /* ---------- 萝卜 ---------- */
  .carrot{position:absolute;z-index:10;width:46px;height:60px;cursor:pointer;
    transform:translate(-50%,-50%);transition:transform .15s;}
  .carrot:focus-visible{outline:3px solid var(--gold);outline-offset:4px;border-radius:8px;}
  .carrot .leaves{position:absolute;left:50%;top:0;transform:translateX(-50%);width:40px;height:26px;}
  .carrot .leaf{position:absolute;bottom:0;left:50%;width:8px;height:24px;
    background:linear-gradient(var(--leaf),var(--leaf-dark));border-radius:60% 60% 40% 40%;transform-origin:bottom center;}
  .carrot .leaf:nth-child(1){transform:translateX(-50%) rotate(-26deg);}
  .carrot .leaf:nth-child(2){transform:translateX(-50%) rotate(0deg);height:27px;}
  .carrot .leaf:nth-child(3){transform:translateX(-50%) rotate(26deg);}
  .carrot .body{position:absolute;left:50%;top:20px;transform:translateX(-50%);width:30px;height:42px;
    background:linear-gradient(160deg,var(--carrot),var(--carrot-dark));
    border-radius:48% 48% 50% 50% / 30% 30% 80% 80%;clip-path:polygon(50% 100%,0 0,100% 0);
    box-shadow:inset -4px -2px 6px rgba(0,0,0,.18);}
  .carrot .body::after{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(115deg,transparent 0 7px,rgba(255,255,255,.2) 7px 8px);}
  .carrot.buried .body{clip-path:polygon(50% 35%,12% 0,88% 0);height:30px;}
  .carrot:hover{transform:translate(-50%,-54%) scale(1.05);}
  @keyframes yank{0%{transform:translate(-50%,-50%) scale(1);}
    35%{transform:translate(-50%,-40%) scale(.92);}
    60%{transform:translate(-50%,-130%) scale(1.15) rotate(-8deg);}
    100%{transform:translate(-50%,-118%) scale(0);opacity:0;}}
  .carrot.pulling{animation:yank .7s cubic-bezier(.6,-0.3,.3,1.4) forwards;pointer-events:none;}
  .dust{position:absolute;width:6px;height:6px;background:var(--planet-rim);border-radius:50%;z-index:9;
    pointer-events:none;animation:splat .6s ease-out forwards;opacity:.8;}
  @keyframes splat{to{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0;}}

  /* ---------- 兔子 ---------- */
  #bunny{position:fixed;z-index:15;width:54px;height:64px;transform:translate(-50%,-100%);
    transition:left .55s cubic-bezier(.4,0,.4,1), top .55s cubic-bezier(.4,0,.4,1);pointer-events:none;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));}
  #bunny.hop{animation:hop .55s ease-in-out;}
  @keyframes hop{0%,100%{margin-top:0;}50%{margin-top:-26px;}}
  #bunny .br-ear{position:absolute;top:-2px;width:11px;height:30px;background:#fff;
    border:2px solid #e3ecf7;border-radius:50% 50% 45% 45%;}
  #bunny .br-ear.l{left:14px;transform:rotate(-14deg);}
  #bunny .br-ear.r{right:14px;transform:rotate(14deg);}
  #bunny .br-ear::after{content:"";position:absolute;inset:4px;background:#bfe6ff;border-radius:inherit;}
  #bunny .br-head{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:42px;height:38px;
    background:#fff;border-radius:50%;}
  #bunny .br-eye{position:absolute;top:30px;width:5px;height:7px;background:#2a3850;border-radius:50%;}
  #bunny .br-eye.l{left:18px;}#bunny .br-eye.r{right:18px;}
  #bunny .br-nose{position:absolute;top:40px;left:50%;transform:translateX(-50%);width:6px;height:5px;
    background:#7fb4ff;border-radius:50%;}
  #bunny .br-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:34px;height:30px;
    background:#fff;border-radius:50% 50% 45% 45%;}
  #bunny .br-cheek{position:absolute;top:36px;width:8px;height:5px;background:#bfe6ff;border-radius:50%;opacity:.85;}
  #bunny .br-cheek.l{left:8px;}#bunny .br-cheek.r{right:8px;}
  #bunny.flip{transform:translate(-50%,-100%) scaleX(-1);}

  /* ---------- 歌词卡 ---------- */
  #cardWrap{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:rgba(6,16,38,.55);backdrop-filter:blur(3px);}
  #cardWrap.show{display:flex;animation:fade .25s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .card{width:min(86vw,360px);
    background:linear-gradient(170deg,#1B335C,#0E2murky 100%);
    background:linear-gradient(170deg,#1B335C,#0E2140 100%);
    border-radius:24px;padding:26px 24px 22px;position:relative;text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.5);border:1.5px solid rgba(127,227,214,.35);
    animation:pop .35s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  .card .mini-carrot{font-size:34px;}
  .card .song{display:inline-block;margin:10px 0 4px;font-size:13px;font-weight:800;letter-spacing:1px;
    color:#0E2140;background:linear-gradient(90deg,var(--teal),var(--planet-rim));
    padding:5px 16px;border-radius:999px;box-shadow:0 4px 12px rgba(127,227,214,.3);}
  .card .song::before{content:"♪ 周深《";}.card .song::after{content:"》";}
  .card .wish{margin-top:16px;font-size:17px;line-height:1.8;font-weight:600;color:var(--cream);}
  .card .wish.empty{color:#7d97bd;font-size:14px;font-weight:500;border:1px dashed rgba(127,227,214,.4);
    padding:12px;border-radius:12px;}
  .card .idx{position:absolute;top:14px;right:18px;font-size:12px;font-weight:800;color:#5d77a0;}
  .card .next{margin-top:20px;font-size:13px;font-weight:700;color:var(--teal);opacity:.85;}

  /* ---------- 终章：胡萝卜星球 ---------- */
  #cosmos{position:fixed;inset:0;z-index:70;display:none;overflow:hidden;
    background:radial-gradient(130% 90% at 50% 30%,var(--space-glow),var(--space-top) 100%);}
  #cosmos.show{display:block;}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;}
  .planet-stage{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);width:260px;height:260px;}
  .bigplanet{position:absolute;inset:30px;border-radius:50%;
    background:radial-gradient(circle at 35% 28%,#9FD0F5,var(--planet) 42%,var(--planet-dark) 100%);
    box-shadow:0 0 70px rgba(110,180,232,.6),inset -18px -14px 44px rgba(8,30,60,.6);animation:spin 18s linear infinite;}
  .bigplanet .patch{position:absolute;background:rgba(255,148,70,.85);border-radius:50%;
    box-shadow:0 0 8px rgba(255,148,70,.6);}
  .ring{position:absolute;left:50%;top:50%;width:300px;height:80px;border:5px solid rgba(255,214,107,.55);
    border-radius:50%;transform:translate(-50%,-50%) rotateX(72deg);box-shadow:0 0 18px rgba(255,214,107,.4);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .orbit-carrot{position:absolute;left:50%;top:50%;font-size:22px;transform-origin:0 0;animation:orbit linear infinite;}
  @keyframes orbit{from{transform:rotate(var(--a)) translateX(150px) rotate(calc(-1*var(--a)));}
    to{transform:rotate(calc(var(--a) + 360deg)) translateX(150px) rotate(calc(-1*var(--a) - 360deg));}}
  #cosmos .finale{position:absolute;left:0;right:0;top:64%;text-align:center;padding:0 24px;color:var(--cream);}
  #cosmos .finale .for{font-size:14px;letter-spacing:6px;opacity:.85;color:var(--teal);animation:fade 1s .3s both;}
  #cosmos .finale h1{font-size:30px;font-weight:900;margin:8px 0 4px;letter-spacing:2px;
    background:linear-gradient(90deg,#BFE6FF,var(--teal),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:fade 1.1s .6s both;}
  #cosmos .finale .planet-name{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:3px;margin-top:6px;
    animation:fade 1.2s .9s both;}
  #cosmos .finale .sign{margin-top:22px;font-size:12.5px;line-height:1.9;opacity:.8;animation:fade 1.4s 1.4s both;}
  #cosmos .finale .replay{margin-top:18px;background:transparent;color:var(--teal);
    border:1.5px solid rgba(127,227,214,.6);border-radius:999px;padding:8px 22px;font-size:13px;font-weight:700;
    cursor:pointer;animation:fade 1.4s 1.6s both;}
  #cosmos .finale .replay:active{transform:scale(.96);}

  .confetti{position:fixed;width:9px;height:14px;z-index:80;top:-20px;border-radius:2px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  @media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.12s!important;}}
</style>
</head>
<body>

<div id="hud">
  <div class="title">致 · 胡萝卜<small>HAPPY BIRTHDAY 胡文博</small></div>
  <div id="counter">已拔 <b>0</b>/23</div>
</div>

<div id="garden">
  <div class="atmos"></div>
  <div id="planet-ground"></div>
</div>

<div class="hint" id="hint">🐰 点一点蓝色星球上的萝卜，帮小兔子拔出来呀～</div>

<div id="bunny">
  <div class="br-ear l"></div><div class="br-ear r"></div>
  <div class="br-head"><div class="br-eye l"></div><div class="br-eye r"></div>
    <div class="br-nose"></div><div class="br-cheek l"></div><div class="br-cheek r"></div></div>
  <div class="br-body"></div>
</div>

<div id="cardWrap">
  <div class="card">
    <div class="idx" id="cardIdx"></div>
    <div class="mini-carrot">🥕</div>
    <div class="song" id="cardSong"></div>
    <div class="wish" id="cardWish"></div>
    <div class="next" id="cardNext">轻触任意处，继续拔下一个 →</div>
  </div>
</div>

<div id="cosmos">
  <div class="planet-stage" id="planetStage">
    <div class="ring"></div>
    <div class="bigplanet" id="bigplanet"></div>
  </div>
  <div class="finale">
    <div class="for">★ FOR 胡文博 ★</div>
    <h1>生日快乐！</h1>
    <div class="planet-name">— 欢迎来到「胡萝卜星球」 🥕 —</div>
    <div class="sign">23 个萝卜 · 23 句周深 · 一颗只属于你的星球<br>这一岁，愿你被整片宇宙温柔以待</div>
    <button class="replay" id="replay">再拔一次 ↺</button>
  </div>
</div>

<script>
/* ============================================================
   ✦✦✦  在这里填歌词  ✦✦✦
   每首歌的 lyric:"" 里，把对应的句子粘进引号中间即可。
   歌名已经按你给的顺序排好，第 8 个是空位，自己补一首。
   填完保存 → 刷新页面，立刻生效。引号里别忘了用中文标点没关系。
   ============================================================ */
const DATA = [
  { song:"小美满",                 lyric:"你愿相信什么就把世界看成什么样，偶尔难题加点重量，越要轻轻地旋转。" },  // 1
  { song:"璀璨冒险人",             lyric:"要炙热啊，要不忘啊，要勇往啊，向心中的梦啊，去追吧。" },  // 2
  { song:"蜃楼",                   lyric:"渺小得如蜉蝣，也仰望着宇宙。" },  // 3
  { song:"好风起",                 lyric:"就凭我，徒手摘星辰，从无到有。" },  // 4
  { song:"光亮",                   lyric:"再无边、再无尽、再无解，总有一线生机，光亮你自己。" },  // 5
  { song:"我的答案",               lyric:"纵前路遍布荆棘，吾亦往矣。" },  // 6
  { song:"能解答一切的答案",       lyric:"你心头那捧血，也依然要温热。" },  // 7
  { song:"生而为赢",               lyric:"跌倒的创伤，最骄傲的勋章；胜者的渴望，最漂亮的倔强。" },  // 8
  { song:"和光同尘",               lyric:"不为盛名而来，不为低谷而去。" },  // 9
  { song:"去明天",                 lyric:"人生没有荒废可言，说起明天勇气不减。" },  // 10
  { song:"热烈盛开",               lyric:"我会热烈地、热切地盛开，开在荒野，开在小小角落与人海。" },  // 11
  { song:"总有美好在路上",         lyric:"美好的事，在赶来的路上。" },  // 12
  { song:"时间啊",                 lyric:"时间啊，一定会对你认真，辛苦与幸福，它悄悄地为你平衡。" },  // 13
  { song:"有一件美好的事情将要发生", lyric:"有一件很美好的事情，将要发生，它终会发生。" }, // 14
  { song:"亲爱的旅人",             lyric:"亲爱的旅人，这一程会短暂却又漫长，而一切终将汇聚成最充盈的景象。" },  // 15
  { song:"好风起",                 lyric:"那片海有多蓝，定要去看看。" },  // 16
  { song:"请我不改",               lyric:"请我不改，我的姿态，坦荡痛快，放肆盛开。" },  // 17
  { song:"向光而行",               lyric:"迎着光，追着光，向光而行，为热爱。" },  // 18
  { song:"有我",                   lyric:"承风骨亦有锋芒，有梦则刚，前往皓月星辰，初心不忘。" },  // 19
  { song:"光亮",                   lyric:"一蓑烟雨任平生。" },  // 20
  { song:"请笃信一个梦",           lyric:"平凡的梦啊，终会被成全。" },  // 21
  { song:"好好生活就是美好生活",   lyric:"人生多么美好，记得保持微笑。" },  // 22
  { song:"芽",                     lyric:"开吧，像花一样，迎光的方向，破开土，褪去壳，长成新的模样。" }   // 23
];

const garden=document.getElementById('garden');
const bunny=document.getElementById('bunny');
const counter=document.querySelector('#counter b');
const hint=document.getElementById('hint');
const cardWrap=document.getElementById('cardWrap');
let pulled=0, total=DATA.length, busy=false;
const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

/* 背景星星 */
for(let i=0;i<110;i++){
  const s=document.createElement('div');s.className='bgstar';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*62+'%';
  const sz=1+Math.random()*2.2;s.style.width=sz+'px';s.style.height=sz+'px';
  s.style.animationDuration=(1.6+Math.random()*2.6)+'s';s.style.animationDelay=(-Math.random()*3)+'s';
  garden.appendChild(s);
}
/* 星球表面环形坑 */
const pg=document.getElementById('planet-ground');
for(let i=0;i<10;i++){
  const c=document.createElement('div');c.className='crater';
  const sz=18+Math.random()*40;c.style.width=sz+'px';c.style.height=sz*0.7+'px';
  c.style.left=(20+Math.random()*60)+'%';c.style.top=(4+Math.random()*16)+'%';
  pg.appendChild(c);
}

/* 在星球表面（画面下方曲面）撒萝卜 */
function genPositions(n){
  const pts=[], W=window.innerWidth, H=window.innerHeight;
  const top=H*0.63, bottom=H*0.93, left=W*0.12, right=W*0.88;
  let tries=0;
  while(pts.length<n && tries<6000){
    tries++;
    const x=left+Math.random()*(right-left);
    const y=top+Math.random()*(bottom-top);
    if(pts.every(p=>Math.hypot(p.x-x,p.y-y)>Math.min(62,(right-left)/6))) pts.push({x,y});
  }
  while(pts.length<n){
    const i=pts.length, cols=6;
    pts.push({x:left+((i%cols)+.5)*(right-left)/cols, y:top+Math.floor(i/cols)*42});
  }
  return pts.sort((a,b)=>a.y-b.y);
}
const carrots=[];
(function build(){
  const pos=genPositions(total);
  DATA.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='carrot buried';el.tabIndex=0;el.setAttribute('role','button');
    el.setAttribute('aria-label','拔萝卜 '+(i+1));
    el.style.left=pos[i].x+'px';el.style.top=pos[i].y+'px';
    el.innerHTML='<div class="leaves"><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div></div><div class="body"></div>';
    el.addEventListener('click',()=>pull(el,i));
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();pull(el,i);}});
    garden.appendChild(el);carrots.push(el);
  });
})();

function moveBunnyTo(x,y,faceLeft){
  bunny.style.left=x+'px';bunny.style.top=(y+6)+'px';
  bunny.classList.toggle('flip',faceLeft);
  if(!reduce){bunny.classList.remove('hop');void bunny.offsetWidth;bunny.classList.add('hop');}
}
window.addEventListener('load',()=>{moveBunnyTo(window.innerWidth/2,window.innerHeight*0.60,false);});

function dust(x,y){
  for(let i=0;i<8;i++){
    const d=document.createElement('div');d.className='dust';
    d.style.left=x+'px';d.style.top=y+'px';
    d.style.setProperty('--dx',(Math.random()*60-30)+'px');
    d.style.setProperty('--dy',(20+Math.random()*30)+'px');
    garden.appendChild(d);setTimeout(()=>d.remove(),650);
  }
}

function pull(el,i){
  if(busy||el.classList.contains('pulling'))return;
  busy=true;hint.style.display='none';
  const x=parseFloat(el.style.left), y=parseFloat(el.style.top);
  const bx=parseFloat(bunny.style.left)||window.innerWidth/2;
  moveBunnyTo(x,y,x<bx);
  const wait=reduce?80:560;
  setTimeout(()=>{
    el.classList.remove('buried');el.classList.add('pulling');dust(x,y);
    setTimeout(()=>{
      el.remove();pulled++;counter.textContent=pulled;showCard(i);
    }, reduce?60:560);
  },wait);
}

const cardIdx=document.getElementById('cardIdx');
const cardSong=document.getElementById('cardSong');
const cardWish=document.getElementById('cardWish');
const cardNext=document.getElementById('cardNext');
function showCard(i){
  cardIdx.textContent='#'+(i+1).toString().padStart(2,'0');
  const d=DATA[i];
  cardSong.textContent=d.song||'（待补一首）';
  if(d.lyric && d.lyric.trim()){
    cardWish.className='wish';cardWish.textContent=d.lyric;
  }else{
    cardWish.className='wish empty';
    cardWish.textContent='✎ 在代码顶部把《'+(d.song||'第 8 首')+'》的歌词填进 lyric 里';
  }
  cardNext.textContent = pulled>=total ? '轻触任意处，前往胡萝卜星球 ✦' : '轻触任意处，继续拔下一个 →';
  cardWrap.classList.add('show');
}
cardWrap.addEventListener('click',()=>{
  cardWrap.classList.remove('show');busy=false;
  if(pulled>=total){setTimeout(launchCosmos,260);}
});

/* 终章 */
function launchCosmos(){
  const cosmos=document.getElementById('cosmos');
  for(let i=0;i<100;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    const sz=1+Math.random()*2.4;s.style.width=sz+'px';s.style.height=sz+'px';
    s.style.animationDuration=(1.5+Math.random()*2.5)+'s';s.style.animationDelay=(-Math.random()*3)+'s';
    cosmos.appendChild(s);
  }
  const planet=document.getElementById('bigplanet');
  for(let i=0;i<7;i++){
    const p=document.createElement('div');p.className='patch';
    const sz=14+Math.random()*30;p.style.width=sz+'px';p.style.height=sz*0.9+'px';
    p.style.left=(18+Math.random()*58)+'%';p.style.top=(18+Math.random()*58)+'%';
    planet.appendChild(p);
  }
  const stage=document.getElementById('planetStage');const N=12;
  for(let i=0;i<N;i++){
    const c=document.createElement('div');c.className='orbit-carrot';c.textContent='🥕';
    c.style.setProperty('--a',(360/N*i)+'deg');c.style.animationDuration=(14+Math.random()*8)+'s';
    stage.appendChild(c);
  }
  cosmos.classList.add('show');confettiBurst();
}
function confettiBurst(){
  const colors=['#FFD66B','#FF9446','#7FE3D6','#6FB4E8','#FFFFFF','#BFE6FF'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2.6+Math.random()*2.4)+'s';c.style.animationDelay=(Math.random()*1.2)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),6000);
  }
}
document.getElementById('replay').addEventListener('click',()=>location.reload());
</script>
